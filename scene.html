<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Three.js Scene</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    .info {
      position: absolute;
      top: 15px;
      left: 15px;
      z-index: 10;
      color: white;
      background: rgba(0,0,0,0.5);
      padding: 10px 14px;
      border-radius: 12px;
    }

    .back {
      position: absolute;
      top: 15px;
      right: 15px;
      z-index: 10;
      color: white;
      text-decoration: none;
      background: rgba(0,0,0,0.5);
      padding: 10px 14px;
      border-radius: 12px;
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.170.0/build/three.module.js"
    }
  }
  </script>
</head>

<body>
  <div id="app">
    <div class="info">
      Мещерякова Анастасія · ІМ-25
    </div>

    <a href="index.html" class="back">Назад</a>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
