<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Сцена</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #000;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    .overlay {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 3;
      padding: 12px 18px;
      color: white;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 14px;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      max-width: calc(100vw - 32px);
    }

    .overlay h1 {
      margin: 0 0 6px;
      font-size: 20px;
    }

    .overlay p {
      margin: 0;
      font-size: 14px;
      opacity: 0.92;
      line-height: 1.4;
    }

    .back-link {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 3;
      text-decoration: none;
      color: white;
      background: rgba(0, 0, 0, 0.45);
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(8px);
    }

    .hint {
      position: absolute;
      bottom: 16px;
      left: 16px;
      z-index: 3;
      padding: 10px 14px;
      color: white;
      background: rgba(0, 0, 0, 0.45);
      border-radius: 12px;
      font-size: 13px;
      max-width: min(420px, calc(100vw - 32px));
      line-height: 1.5;
    }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.170.0/build/three.module.js"
      }
    }
  </script>
</head>
<body>
  <div id="app">
    <div class="overlay">
      <h1>AR Сцена</h1>
      <p>Мещерякова Анастасія · Група ІМ-25</p>
    </div>

    <a class="back-link" href="index.html">На головну</a>

    <div class="hint">
      Дозвольте доступ до камери. Після цього відео буде фоном, а 3D-куб Three.js відобразиться поверх нього.
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
