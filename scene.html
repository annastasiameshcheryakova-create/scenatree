<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Scene</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #000;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    .panel {
      position: absolute;
      z-index: 10;
      color: white;
      background: rgba(0, 0, 0, 0.42);
      border: 1px solid rgba(255,255,255,0.14);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 16px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.28);
    }

    .info {
      top: 16px;
      left: 16px;
      padding: 14px 18px;
      max-width: calc(100vw - 32px);
    }

    .info h1 {
      margin: 0 0 6px;
      font-size: 20px;
    }

    .info p {
      margin: 0;
      font-size: 14px;
      line-height: 1.45;
      opacity: 0.95;
    }

    .back-link {
      top: 16px;
      right: 16px;
      padding: 12px 16px;
      text-decoration: none;
      color: white;
      font-size: 14px;
    }

    .hint {
      left: 16px;
      bottom: 16px;
      padding: 12px 16px;
      max-width: min(430px, calc(100vw - 32px));
      font-size: 13px;
      line-height: 1.5;
    }

    .center-marker {
      position: absolute;
      z-index: 9;
      left: 50%;
      top: 50%;
      width: 14px;
      height: 14px;
      margin-left: -7px;
      margin-top: -7px;
      border: 2px solid rgba(255,255,255,0.75);
      border-radius: 50%;
      box-shadow: 0 0 18px rgba(255,255,255,0.45);
      pointer-events: none;
    }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.170.0/build/three.module.js"
      }
    }
  </script>
</head>
<body>
  <div id="app">
    <div class="panel info">
      <h1>AR / Three.js Сцена</h1>
      <p>Мещерякова Анастасія · Група ІМ-25</p>
    </div>

    <a class="panel back-link" href="index.html">На головну</a>

    <div class="panel hint">
      Дозвольте доступ до камери. Відео буде відображене як фон, а 3D-об’єкт з Three.js — поверх нього.
    </div>

    <div class="center-marker"></div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
