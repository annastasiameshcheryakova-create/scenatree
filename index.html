<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WebAR Проєкт</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .container {
      width: 90%;
      max-width: 700px;
      padding: 40px;
      border-radius: 25px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    h2 {
      font-weight: normal;
      margin-bottom: 30px;
      opacity: 0.9;
    }

    .btn {
      display: inline-block;
      padding: 15px 30px;
      border-radius: 30px;
      text-decoration: none;
      font-size: 18px;
      color: white;
      background: linear-gradient(90deg, #00c6ff, #0072ff);
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    footer {
      margin-top: 30px;
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Мещерякова Анастасія</h1>
    <h2>Група ІМ-25</h2>

    <a href="scene.html" class="btn">
      🚀 Відкрити сцену Three.js
    </a>

    <footer>
      2026 © WebAR Project
    </footer>
  </div>
</body>
</html>
