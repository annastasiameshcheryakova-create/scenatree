<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>WebAR Проєкт</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      text-align: center;
    }

    .container {
      max-width: 800px;
      margin: 100px auto;
      padding: 40px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    h2 {
      font-weight: normal;
      margin-bottom: 30px;
    }

    .info {
      font-size: 18px;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      padding: 15px 30px;
      background: #00c6ff;
      color: white;
      text-decoration: none;
      border-radius: 30px;
      font-size: 18px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #0072ff;
      transform: scale(1.05);
    }

    footer {
      margin-top: 40px;
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Мещерякова Анастасія</h1>
    <h2>Група ІМ-25</h2>

    <div class="info">
      <p>Дисципліна: Доповнена реальність (WebAR)</p>
      <p>Проєкт: Three.js + Веб-камера</p>
    </div>

    <a href="scene.html" class="btn">🚀 Відкрити AR-сцену</a>

    <footer>
      2026 © WebAR Project
    </footer>
  </div>

</body>
</html>
